<!doctype html>
<html lang="ko">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>자유 게시판 - 현대형 UI</title>
    <link rel="stylesheet" href="style2.css" />
  </head>
  <body>
    <div class="board-wrapper">
      <div class="board-container">
        <div class="header-section">
          <h1 class="board-title">자유 게시판</h1>
          <p class="board-subtitle">함께 나누는 이야기의 공간</p>
        </div>

        <div class="form-section">
          <div class="form-group">
            <input
              type="text"
              class="input-field"
              placeholder="작성자 이름"
              aria-label="작성자"
            />
          </div>

          <div class="form-group">
            <input
              type="text"
              class="input-field"
              placeholder="글 제목"
              aria-label="제목"
            />
          </div>

          <div class="form-group">
            <textarea
              class="textarea-field"
              placeholder="내용을 입력하세요"
              aria-label="내용"
            ></textarea>
          </div>

          <button type="button" class="submit-btn">
            <span class="btn-icon">✉️</span> 게시글 등록
          </button>
        </div>

        <div class="posts-section">
          <h2 class="posts-title">최근 게시글</h2>

          <div class="posts-list">
            <article class="post-card">
              <div class="post-header">
                <div class="author-info">
                  <div class="author-avatar">홍</div>
                  <div class="author-details">
                    <h3 class="author-name">홍길동</h3>
                    <time class="post-date">2026. 05. 27.</time>
                  </div>
                </div>
              </div>
              <div class="post-content">
                <h4 class="post-title">첫 번째 연습용 게시글입니다.</h4>
                <p class="post-summary">HTML과 CSS를 이용해 게시판의 틀을 잡는 조각 코드입니다.</p>
              </div>
              <div class="post-footer">
                <button type="button" class="delete-btn">삭제</button>
              </div>
            </article>

            <article class="post-card">
              <div class="post-header">
                <div class="author-info">
                  <div class="author-avatar">이</div>
                  <div class="author-details">
                    <h3 class="author-name">이순신</h3>
                    <time class="post-date">2026. 05. 27.</time>
                  </div>
                </div>
              </div>
              <div class="post-content">
                <h4 class="post-title">질문 있습니다! style.css 연결이 안 돼요.</h4>
                <p class="post-summary">link 태그의 href 경로에 파일 이름이 올바르게 적혔는지 확인해 보세요.</p>
              </div>
              <div class="post-footer">
                <button type="button" class="delete-btn">삭제</button>
              </div>
            </article>

            <article class="post-card">
              <div class="post-header">
                <div class="author-info">
                  <div class="author-avatar">신</div>
                  <div class="author-details">
                    <h3 class="author-name">신사임당</h3>
                    <time class="post-date">2026. 05. 26.</time>
                  </div>
                </div>
              </div>
              <div class="post-content">
                <h4 class="post-title">웹디자인 초보자를 위한 꿀팁 공유</h4>
                <p class="post-summary">테이블 레이아웃을 잡을 때는 border-collapse 속성이 필수입니다.</p>
              </div>
              <div class="post-footer">
                <button type="button" class="delete-btn">삭제</button>
              </div>
            </article>
          </div>
        </div>
      </div>
    </div>
  </body>
</html>
